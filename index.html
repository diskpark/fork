<body>
<div id="app"></div>
<script>
// Firebase REST API
var FB_URL='https://team-order-1cfb0-default-rtdb.asia-southeast1.firebasedatabase.app/forklift';

// 관리자 체크
function isAdmin(){return localStorage.getItem('adminMode')==='true';}
function setAdmin(v){localStorage.setItem('adminMode',v?'true':'false');}

// Firebase에서 데이터 불러오기
function syncFromFirebase(callback){
  fetch(FB_URL+'.json').then(function(r){return r.json();}).then(function(data){
    if(data){
      if(data.carDays){
        state.carDays=data.carDays; // 날짜키 객체 그대로
        localStorage.setItem('carPlan',JSON.stringify(data.carDays));
      }
      if(data.absentWorkers&&Array.isArray(data.absentWorkers))state.absentWorkers=data.absentWorkers;
      if(data.dayExcludes){
        state.dayExcludes=data.dayExcludes; // 날짜키 객체 그대로
        localStorage.setItem('dayExcludes',JSON.stringify(data.dayExcludes));
      }
      if(typeof data.sundayCount==='number'){
        state.sundayCount=data.sundayCount;
        localStorage.setItem('sundayCount',data.sundayCount);
      }
      if(data.firstWorker){
        state.firstWorker=data.firstWorker;
        localStorage.setItem('firstWorker',JSON.stringify({date:new Date().toDateString(),name:data.firstWorker}));
      }
    }
    autoSetFirstWorker();
    render();
    if(callback)callback();
  }).catch(function(){
    autoSetFirstWorker();
    render();
    if(callback)callback();
  });
}

function autoSetFirstWorker(){
  // Firebase에서 받은 firstWorker가 오늘 날짜가 아니면 자동 계산
  var saved=null;
  try{saved=JSON.parse(localStorage.getItem('firstWorker')||'null');}catch(e){}
  var todayStr=new Date().toDateString();
  if(saved&&saved.date===todayStr&&saved.name)return; // 오늘 이미 설정됨

  // 전날 history에서 대양 1번 다음 사람 계산
  var hist=state.history||[];
  if(hist.length===0)return;
  var yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  var yStr=yesterday.toDateString();
  var yEntry=hist.find(function(h){return h.date===yStr;});
  if(!yEntry||!yEntry.name)return;

  // 전날 대양1번의 다음 순번
  var idx=WORKERS.indexOf(yEntry.name);
  if(idx<0)return;
  var absent=state.absentWorkers||[];
  var next=idx;
  for(var i=1;i<=N;i++){
    next=(idx+i)%N;
    if(absent.indexOf(WORKERS[next])<0)break;
  }
  var newFirst=WORKERS[next];
  state.firstWorker=newFirst;
  localStorage.setItem('firstWorker',JSON.stringify({date:todayStr,name:newFirst}));
  if(isAdmin())saveFirstWorker(newFirst);
}

// Firebase에 저장 (관리자만)
function saveCarDays(map){
  if(!isAdmin())return;
  fetch(FB_URL+'/carDays.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(map)});
}
function saveSundayCount(cnt){
  if(!isAdmin())return;
  fetch(FB_URL+'/sundayCount.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cnt)});
}
function saveFirstWorker(name){
  if(!isAdmin())return;
  fetch(FB_URL+'/firstWorker.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(name)});
}
function saveAbsentWorkers(workers){
  if(!isAdmin())return;
  fetch(FB_URL+'/absentWorkers.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(workers)});
}
function saveDayExcludes(map){
  if(!isAdmin())return;
  fetch(FB_URL+'/dayExcludes.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(map)});
}

// 실시간 리스너 (30초마다 폴링)
var fbListening=false;
function startFbListener(){
  if(fbListening)return;
  fbListening=true;
  setInterval(function(){
    if(!document.hidden)syncFromFirebase(null);
  },600000);
}

var WORKERS=["이원훈","장형규","조현철","박진호","홍인석","하정남","황정호","김현진","전창범","오규종","김경훈","정철수","황인태","안찬범","김상원","이동현","김태민","김성환","김세영","홍원진","이재일","이준영","김태호","김택성","채관기","김재원","장병숙","윤광덕","박성기"];
var N=WORKERS.length;
var KR=["일","월","화","수","목","금","토"];
var VACATION_SCHEDULE=[
  {name:"김상원",start:"2026-04-13",end:"2026-04-16"},
  {name:"황정호",start:"2026-04-20",end:"2026-04-23"},
  {name:"하정남",start:"2026-04-27",end:"2026-04-30"},
  {name:"이동현",start:"2026-05-04",end:"2026-05-07"},
  {name:"장형규",start:"2026-05-18",end:"2026-05-21"},
  {name:"조현철",start:"2026-05-26",end:"2026-05-29"},
  {name:"홍인석",start:"2026-06-01",end:"2026-06-04"},
  {name:"홍원진",start:"2026-06-15",end:"2026-06-18"},
  {name:"김재원",start:"2026-06-22",end:"2026-06-25"},
  {name:"황인태",start:"2026-06-29",end:"2026-07-02"},
  {name:"김성환",start:"2026-07-06",end:"2026-07-09"},
  {name:"오규종",start:"2026-07-13",end:"2026-07-16"},
  {name:"이재일",start:"2026-07-20",end:"2026-07-23"},
  {name:"김택성",start:"2026-07-27",end:"2026-07-30"},
  {name:"김세영",start:"2026-08-03",end:"2026-08-06"},
  {name:"정철수",start:"2026-08-10",end:"2026-08-13"},
  {name:"전창범",start:"2026-08-18",end:"2026-08-21"},
  {name:"김태민",start:"2026-08-25",end:"2026-08-28"},
  {name:"이준영",start:"2026-08-31",end:"2026-09-03"},
  {name:"채관기",start:"2026-09-08",end:"2026-09-11"},
  {name:"장병숙",start:"2026-09-30",end:"2026-10-03"},
  {name:"김경훈",start:"2026-10-05",end:"2026-10-08"},
  {name:"윤광덕",start:"2026-10-28",end:"2026-10-31"},
  {name:"안찬범",start:"2026-11-23",end:"2026-11-26"},
  {name:"이원훈",start:"2026-12-07",end:"2026-12-10"},
  {name:"김현진",start:"2026-12-21",end:"2026-12-24"},
  {name:"박진호",start:"2026-12-28",end:"2026-12-31"},
  {name:"박성기",start:"2027-01-25",end:"2027-01-28"}
];
var SEAWORLD_SCHEDULE=[
  {name:"정태경",start:"2026-04-06",end:"2026-04-09"},
  {name:"박혁신",start:"2026-05-11",end:"2026-05-14"},
  {name:"김재일",start:"2026-06-17",end:"2026-06-20"},
  {name:"문환석",start:"2026-10-14",end:"2026-10-17"}
];

function getStartOffset(monStart){return(monStart&&new Date().getDay()===0)?1:0;}
function getWeekDates(monStart){var off=getStartOffset(monStart),t=new Date(),r=[];for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+off+i);r.push(pad(d.getMonth()+1)+"."+pad(d.getDate()));}return r;}
function getWeekDays(monStart){var off=getStartOffset(monStart),t=new Date(),r=[];for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+off+i);r.push(KR[d.getDay()]);}return r;}
function getWeekDateObjs(monStart){var off=getStartOffset(monStart),t=new Date(),r=[];for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+off+i);d.setHours(0,0,0,0);r.push(d);}return r;}
function pad(n){return n<10?"0"+n:""+n;}
function dateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtToday(){var t=new Date();return t.getFullYear()+"."+pad(t.getMonth()+1)+"."+pad(t.getDate());}
function fmtVacDate(s){var d=new Date(s+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate()+"("+KR[d.getDay()]+")";}
function toNum(name){return WORKERS.indexOf(name)+1;}

function getAutoVac(dateObjs){
  var r=[];for(var i=0;i<7;i++){r.push({});}
  // 씨월드 땜빵: dayExcludes에서 씨월드로 지정된 인원 찾기
  var swSubs={};
  dateObjs.forEach(function(cur){
    var k=dateKey(cur);
    var exclMap=state.dayExcludes[k]||{};
    Object.keys(exclMap).forEach(function(name){
      if(exclMap[name]==="씨월드"&&!swSubs[name]){
        // 씨월드 스케줄 중 지정날짜와 가장 가까운(또는 포함하는) 스케줄 찾기
        var best=null,bestDiff=Infinity;
        SEAWORLD_SCHEDULE.forEach(function(v){
          var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");
          if(cur>=s&&cur<=e){best=v;bestDiff=0;}// 기간 안
          else if(bestDiff>0){
            var diff=Math.min(Math.abs(cur-s),Math.abs(cur-e));
            if(diff<bestDiff){bestDiff=diff;best=v;}
          }
        });
        if(best)swSubs[name]=best;
      }
    });
  });
  dateObjs.forEach(function(cur,idx){
    VACATION_SCHEDULE.forEach(function(v){var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");if(cur>=s&&cur<=e)r[idx][v.name]="휴가";});
    SEAWORLD_SCHEDULE.forEach(function(v){var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");if(cur>=s&&cur<=e)r[idx][v.name]="씨월드";});
    Object.keys(swSubs).forEach(function(name){
      var v=swSubs[name];
      var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");
      if(cur>=s&&cur<=e)r[idx][name]="씨월드";
    });
  });
  return r;
}

function pickFwd(count,startIdx,excl){var team=[],cur=((startIdx%N)+N)%N,safe=0;while(team.length<count&&safe<N*2){var name=WORKERS[cur];cur=(cur+1)%N;safe++;if(excl.indexOf(name)<0&&team.indexOf(name)<0)team.push(name);}return{team:team,next:cur};}
function pickRev(count,fromIdx,excl){var team=[],cur=((fromIdx%N)+N)%N,safe=0;while(team.length<count&&safe<N*2){var name=WORKERS[cur];safe++;if(excl.indexOf(name)<0&&team.indexOf(name)<0)team.push(name);cur=((cur-1)+N)%N;}return{team:team.reverse(),next:cur};}
function insertOrder(arr,name){var idx=WORKERS.indexOf(name),ip=arr.length;for(var i=0;i<arr.length;i++){if(WORKERS.indexOf(arr[i])>idx){ip=i;break;}}arr.splice(ip,0,name);}

function calcSchedule(carDays,dayExcl,firstWorker,sundayCount,weekDays){
  var fi=WORKERS.indexOf(firstWorker);
  // 초기 비번 범위: fi 앞 6명 (fi-6 ~ fi-1), 첫날 대양1번=fi
  var initBibStart=(fi-6+N)%N;
  var initBib=[];for(var ii=0;ii<6;ii++)initBib.push(WORKERS[(initBibStart+ii)%N]);
  var cursor=fi,prevDae=initBib,prevSun=[],prevYac=[],prevActBib=initBib;
  var result=[];
  for(var d=0;d<carDays.length;d++){
    var hasCar=carDays[d],prevCar=d>0?carDays[d-1]:null;
    var exclMap=dayExcl[d]||{};
    // 자동차 지정자 분리 - 일반 배정에서 완전히 제외하고 jad에만 강제 배정
    var jadForced=Object.keys(exclMap).filter(function(w){return exclMap[w]==="자동차";});
    var excl=Object.keys(exclMap).filter(function(w){return exclMap[w]!=="자동차";});
    // exclAll = 일반 배정에서 제외할 전체 목록 (결근/휴가/씨월드 + 자동차)
    var exclAll=excl.concat(jadForced);
    var avail=WORKERS.filter(function(w){return exclAll.indexOf(w)<0;});
    // 비번 = 전날 실제 대양 근무자 그대로
    // 자동차(jadForced)는 이미 exclAll에서 제외됨 → 자동차 지정자는 비번 없음
    // 오늘 결근/씨월드인 사람만 비번에서 제외
    var bib=prevDae.filter(function(w){return exclAll.indexOf(w)<0;});
    // 비번 6명 미달 시 전날 성우 순번으로 보충
    if(bib.length<6&&prevSun.length>0){
      var sunFill=prevSun.filter(function(w){return exclAll.indexOf(w)<0&&bib.indexOf(w)<0;});
      var need=6-bib.length;
      for(var si=0;si<sunFill.length&&bib.length<6;si++)bib.push(sunFill[si]);
    }
    var prevExclMap=d>0?(dayExcl[d-1]||{}):{};
    var absRet=Object.keys(prevExclMap).filter(function(w){return prevExclMap[w]==="결근"&&exclAll.indexOf(w)<0;});
    var vacRet=Object.keys(prevExclMap).filter(function(w){return prevExclMap[w]==="휴가"&&exclAll.indexOf(w)<0;});
    // 비번 인원도 배정에서 제외
    var exclWithBib=exclAll.concat(bib);
    if(hasCar){
      var dae,sun,yac,jay;
      if(d===0||!prevCar){
        var r1=pickFwd(6,cursor,exclWithBib);dae=r1.team;
        var r2=pickFwd(4,r1.next,exclWithBib);sun=r2.team;
        var r3=pickFwd(6,r2.next,exclWithBib);yac=r3.team;
        var r4=pickFwd(4,r3.next,exclWithBib);jay=r4.team;
        cursor=r4.next;
      } else {
        dae=prevSun.concat(prevYac.slice(0,2)).filter(function(w){return exclWithBib.indexOf(w)<0;});
        // dae 6명 미달 시 prevYac 나머지에서 순서대로 보충
        var yacUsed=2;
        for(var yi=2;yi<prevYac.length&&dae.length<6;yi++){
          var w=prevYac[yi];
          if(exclWithBib.indexOf(w)<0&&dae.indexOf(w)<0){dae.push(w);yacUsed=yi+1;}
        }
        // sun = prevYac에서 dae에 안 쓴 나머지 (최대 4명)
        sun=[];
        for(var yi2=yacUsed;yi2<prevYac.length&&sun.length<4;yi2++){
          var w2=prevYac[yi2];
          if(exclWithBib.indexOf(w2)<0&&dae.indexOf(w2)<0)sun.push(w2);
        }
        // sun 부족 시 prevJay 앞번호부터 보충, 그래도 부족하면 cursor
        if(sun.length<4){
          var jayFill=result[d-1].jay.filter(function(w){return exclWithBib.indexOf(w)<0&&dae.indexOf(w)<0&&sun.indexOf(w)<0;});
          while(sun.length<4&&jayFill.length>0)sun.push(jayFill.shift());
        }
        if(sun.length<4){var rFill2=pickFwd(4-sun.length,cursor,exclWithBib.concat(dae).concat(sun));sun=sun.concat(rFill2.team);cursor=rFill2.next;}
        var pj=result[d-1].jay.filter(function(w){return exclWithBib.indexOf(w)<0;});
        var r1=pickFwd(6-pj.length,cursor,exclWithBib.concat(dae).concat(sun));yac=pj.concat(r1.team);cursor=r1.next;
        var r2=pickFwd(4,cursor,exclWithBib.concat(dae).concat(sun).concat(yac));jay=r2.team;cursor=r2.next;
      }
      var jadExtra=[];
      absRet.forEach(function(ret){
        if(dae.indexOf(ret)>=0)dae=dae.filter(function(w){return w!==ret;});
        jadExtra.push(ret);
        var lastBibIdx=WORKERS.indexOf(bib[bib.length-1]);
        var nextIdx=(lastBibIdx+1)%N;
        while(exclWithBib.indexOf(WORKERS[nextIdx])>=0||jadExtra.indexOf(WORKERS[nextIdx])>=0){nextIdx=(nextIdx+1)%N;}
        bib.push(WORKERS[nextIdx]);
      });
      // vacRet(휴가복귀자)는 exclAll에 없으므로 pickFwd/pickRev가 자동으로 순번 포함
      var assigned=dae.concat(sun,yac,jay,bib);
      var jad=avail.filter(function(w){return assigned.indexOf(w)<0;});
      jadExtra.forEach(function(ret){if(jad.indexOf(ret)<0)jad.push(ret);});
      jadForced.forEach(function(w){if(jad.indexOf(w)<0)jad.push(w);});
      result.push({hasCar:true,dae:dae,sun:sun,yac:yac,jay:jay,jad:jad,bib:bib,rest:[],excl:exclMap});
      prevDae=dae;prevSun=sun;prevYac=yac;prevActBib=bib;
    } else {
      // 차없음 또는 일요일
      var isSunday=weekDays&&weekDays[d]==="일";
      if(isSunday&&sundayCount>0){
        // 일요일 근무: 비번 다음 순번부터 sundayCount명
        var li=(WORKERS.indexOf(bib.length>0?bib[bib.length-1]:prevDae[prevDae.length-1])+1)%N;
        var sw=pickFwd(sundayCount,li,exclWithBib).team;
        var rest=avail.filter(function(w){return sw.indexOf(w)<0&&bib.indexOf(w)<0;});
        result.push({hasCar:false,dae:[],sun:[],yac:[],jay:[],jad:jadForced,sunw:sw,bib:bib,rest:rest,excl:exclMap,isSun:true});
        var bibForNext=sw.slice();
        if(bibForNext.length>6){bibForNext=bibForNext.slice(0,6);}
        else if(bibForNext.length<6){
          var cur2=(WORKERS.indexOf(bibForNext[bibForNext.length-1])+1)%N;
          while(bibForNext.length<6){
            if(exclAll.indexOf(WORKERS[cur2])<0&&bibForNext.indexOf(WORKERS[cur2])<0)bibForNext.push(WORKERS[cur2]);
            cur2=(cur2+1)%N;
          }
        }
        cursor=(WORKERS.indexOf(bibForNext[bibForNext.length-1])+1)%N;
        prevDae=bibForNext;prevSun=[];prevYac=[];prevActBib=sw;
      } else {
        if(d===0||prevCar===null){
          // 첫날: firstWorker부터 순방향
          var li=WORKERS.indexOf(firstWorker);
          var rD=pickFwd(6,li,exclWithBib),rS=pickFwd(4,rD.next,exclWithBib),rJ=pickFwd(4,rS.next,exclWithBib);
          var dae=rD.team,sun=rS.team,jay=rJ.team;
        } else if(prevCar===true){
          // 차있음→차없음 전환: 전날 비번 말번부터 역순
          var liStart=WORKERS.indexOf(prevActBib[prevActBib.length-1]);
          var rJ=pickRev(4,liStart,exclWithBib);
          var rS=pickRev(4,rJ.next,exclWithBib);
          var rD=pickRev(6,rS.next,exclWithBib);
          var jay=rJ.team,sun=rS.team,dae=rD.team;
        } else {
          // 차없음 연속: 전날 대양 1번 앞번호 = 제이 말번, 역순으로 제이→성우→대양
          var liStart=(WORKERS.indexOf(prevDae[0])-1+N)%N;
          var rJ=pickRev(4,liStart,exclWithBib);
          var rS=pickRev(4,rJ.next,exclWithBib);
          var rD=pickRev(6,rS.next,exclWithBib);
          var jay=rJ.team,sun=rS.team,dae=rD.team;
        }
        absRet.forEach(function(ret){
          insertOrder(jay,ret);
          if(jay.length>4){var pushed=jay.shift();insertOrder(sun,pushed);if(sun.length>4){var pushed2=sun.shift();insertOrder(dae,pushed2);if(dae.length>6){var pushed3=dae.shift();bib.push(pushed3);}}}
        });
        var assigned=dae.concat(sun,jay,bib);
        var rest=avail.filter(function(w){return assigned.indexOf(w)<0&&bib.indexOf(w)<0;});
        result.push({hasCar:false,dae:dae,sun:sun,yac:[],jay:jay,jad:jadForced,bib:bib,rest:rest,excl:exclMap});
        prevDae=dae;prevSun=sun;prevYac=[];prevActBib=bib;
        if(d<carDays.length-1&&carDays[d+1])cursor=(WORKERS.indexOf(dae[dae.length-1])+1)%N;
      }
    }
  }
  return result;
}

function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)for(var k in attrs){if(k==="className")el.className=attrs[k];else if(k.startsWith("on"))el[k.toLowerCase()]=attrs[k];else el.setAttribute(k,attrs[k]);}
  if(children){if(typeof children==="string")el.innerHTML=children;else if(Array.isArray(children))children.forEach(function(c){if(c)el.appendChild(typeof c==="string"?document.createTextNode(c):c);});else el.appendChild(children);}
  return el;
}

function applySettings(s){
  var sizes=[10,11,12,13,14,15,16];
  var size=(sizes[s.size]||13)+"px";
  var styleEl=document.getElementById("dyn-style");
  if(!styleEl){styleEl=document.createElement("style");styleEl.id="dyn-style";document.head.appendChild(styleEl);}
  styleEl.textContent="body{font-size:"+size+"!important}";
}

function renderMySchedule(sched,wk,wd,dateObjs){
  var name=state.myName;

  var COLORS={dae:"#4a9eff",sun:"#6effb4",yac:"#ffd93d",jay:"#ff9f7f",jad:"#88cc88",rest:"#888",bib:"#cccc55",sunw:"#ffd93d"};
  sched.forEach(function(day,idx){
    var site="",color="#aaa",pos=0;
    if(day.isSun){
      if((day.sunw||[]).indexOf(name)>=0){pos=(day.sunw||[]).indexOf(name)+1;site="일요근무("+pos+"번)";color="#ffd93d";}

      else if((day.rest||[]).indexOf(name)>=0){site="비번";color="#888";}
      else site="휴가";
    } else {
      var NOPOS=["jad","rest","bib"];
      var keys=["dae","sun","yac","jay","jad","bib","rest"];
      for(var ki=0;ki<keys.length;ki++){var k=keys[ki],arr=day[k]||[];if(arr.indexOf(name)>=0){pos=arr.indexOf(name)+1;site=NOPOS.indexOf(k)>=0?LABELS[k]:LABELS[k]+"("+pos+"번)";color=COLORS[k];break;}}
      if(!site){
        // 원래 씨월드 휴가자 vs 땜빵 구분
        var isOrigSw=SEAWORLD_SCHEDULE.some(function(v){return v.name===name&&dateObjs[idx]>=new Date(v.start+"T00:00:00")&&dateObjs[idx]<=new Date(v.end+"T00:00:00");});

        if(isOrigSw||isOrigVac){site="휴가";color="#ffd93d";}

    dayEl.innerHTML=wk[idx]+"<br><span style='font-size:9px;color:#444'>"+wd[idx]+"</span>";
    item.appendChild(dayEl);
    item.appendChild(h("div",{className:"my-site",style:"color:"+color},site));
    rows.appendChild(item);
  });
  card.appendChild(rows);return card;
}

function formatNames(label,names){
  if(!names||names.length===0)return "";
  var labels={"대양":"대양","성우":"성우","오선":"오선","씨월드":"씨월드","C":"  C","휴가":"휴가","결근":"결근","차":"  차","일요근무":"일요근무"};
  var lb=(labels[label]||label)+", ";
  var pad="";for(var p=0;p<lb.length;p++)pad+=" ";
  var line="";
  for(var i=0;i<names.length;i+=4){var chunk=names.slice(i,i+4);if(i===0)line+=lb+chunk.join(", ")+"\n";else line+=pad+chunk.join(", ")+"\n";}
  return line;
}

function makeTomorrowText(sched,wk,wd,merged){
  var tomorrow=sched[1];
  var tIdx=1;
  var dateStr=wd[tIdx].replace(".","/").replace(/^0/,"")+" "+wk[tIdx];
  var line=dateStr+"\n";
  var tomorrowMerged=merged[1]||{};
  var vacNames=Object.keys(tomorrowMerged).filter(function(k){return tomorrowMerged[k]==="휴가";});
  var absNames=Object.keys(tomorrowMerged).filter(function(k){return tomorrowMerged[k]==="결근";});
  var seaworldFixed=["정태경"];
  if(tomorrow.hasCar){
    line+=formatNames("대양",tomorrow.dae);
    line+=formatNames("성우",tomorrow.sun);
    line+=formatNames("차",tomorrow.yac);
    line+=formatNames("오선",tomorrow.jay);
    line+=formatNames("차",tomorrow.jad);
  } else if(tomorrow.isSun){
    line+=formatNames("일요근무",tomorrow.sunw);
  } else {
    line+=formatNames("대양",tomorrow.dae);
    line+=formatNames("성우",tomorrow.sun);
    line+=formatNames("오선",tomorrow.jay);
  }
  line+=formatNames("C",seaworldFixed);
  line+=formatNames("휴가",vacNames);
  line+=formatNames("결근",absNames);
  return line.trim();
}

function makeTodayText(sched,wk,wd,merged){
  var today=sched[0];
  var todayMerged=merged[0]||{};
  var vacNames=Object.keys(todayMerged).filter(function(k){return todayMerged[k]==="휴가";});
  var absNames=Object.keys(todayMerged).filter(function(k){return todayMerged[k]==="결근";});
  var swNames=Object.keys(todayMerged).filter(function(k){return todayMerged[k]==="씨월드";});
  var line=wd[0].replace(".","/").replace(/^0/,"")+" "+wk[0]+" (오늘)\n";
  if(today.hasCar){
    line+=formatNames("대양",today.dae);
    line+=formatNames("성우",today.sun);
    line+=formatNames("차",today.yac);
    line+=formatNames("오선",today.jay);
    line+=formatNames("차",today.jad);
  } else {
    line+=formatNames("대양",today.dae);
    line+=formatNames("성우",today.sun);
    line+=formatNames("오선",today.jay);
  }
  if(swNames.length>0)line+=formatNames("휴가",swNames);
  if(vacNames.length>0)line+=formatNames("휴가",vacNames);
  if(absNames.length>0)line+=formatNames("결근",absNames);
  return line.trim();
}

  var allVac=VACATION_SCHEDULE.map(function(v){return Object.assign({},v,{isSeaworld:false});})
    .concat(SEAWORLD_SCHEDULE.map(function(v){return Object.assign({},v,{isSeaworld:true});}));
  allVac.sort(function(a,b){return a.start>b.start?1:a.start<b.start?-1:0;});
  allVac.forEach(function(v){
    var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");
    var isActive=today>=s&&today<=e,isPast=today>e;
    var color=isActive?(v.isSeaworld?"#88eeff":"#ffd93d"):isPast?"#444":"#aaa";
    var row=document.createElement("div");
    row.style.cssText="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #ffffff08";
    var nameEl=document.createElement("div");
    nameEl.style.cssText="min-width:80px;font-size:13px;font-weight:700;color:"+color;
    nameEl.textContent=v.name;
    if(isActive){var badge=document.createElement("span");badge.style.cssText="font-size:9px;background:"+(v.isSeaworld?"#88eeff33":"#ffd93d33")+";color:"+(v.isSeaworld?"#88eeff":"#ffd93d")+";border-radius:4px;padding:1px 5px;margin-left:6px";badge.textContent="휴가중";nameEl.appendChild(badge);}
    var dateEl=document.createElement("div");
    dateEl.style.cssText="font-size:11px;color:"+(isPast?"#444":"#888")+";margin-left:8px";
    dateEl.textContent=fmtVacDate(v.start)+" ~ "+fmtVacDate(v.end);
    row.appendChild(nameEl);row.appendChild(dateEl);inner.appendChild(row);
  });
  bg.appendChild(inner);return bg;
}

  var sizeVal=h("div",{style:"font-size:15px;font-weight:700;color:#fff;min-width:40px;text-align:center"},sizeMap[s.size]+"px");

function selectMyName(name){var newName=state.myName===name?"":name;localStorage.setItem('myName',newName);setState({myName:newName});}
function selectFirstWorker(name){
  var isDesel=state.firstWorker===name;
  var newName=isDesel?"":name;
  if(!isDesel&&name){
    var today=new Date().toDateString();
    var hist=state.history.filter(function(h){return h.date!==today;});
    hist.unshift({date:today,name:name});
    if(hist.length>2)hist=hist.slice(0,2);
    localStorage.setItem('dayHistory',JSON.stringify(hist));
    localStorage.setItem('firstWorker',JSON.stringify({date:today,name:newName}));
    saveFirstWorker(newName);
    setState({firstWorker:newName,history:hist});
  } else {
    localStorage.setItem('firstWorker',JSON.stringify({date:new Date().toDateString(),name:newName}));
    saveFirstWorker(newName);
    setState({firstWorker:newName});
  }
}
// 선박 실시간 추적
var vesselWS=null;
var vesselMap=null;
var vesselMarker=null;

function openVesselPopup(){
  setState({vesselPopup:true,vesselData:null});
}

function closeVesselPopup(){
  if(vesselWS){vesselWS.close();vesselWS=null;}
  if(vesselMap){vesselMap.remove();vesselMap=null;vesselMarker=null;}
  setState({vesselPopup:false,vesselData:null});
}

function loadLeaflet(cb){
  if(window.L){cb();return;}
  var link=document.createElement('link');
  link.rel='stylesheet';
  link.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(link);
  var script=document.createElement('script');
  script.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload=cb;
  document.head.appendChild(script);
}

function startVesselTracking(){
  if(vesselWS)return;
  var API_KEY='4ea1dfb392d9329ddc6b979a55e80d5f2077b20c';
  var MMSI='440925000';

  try{
    vesselWS=new WebSocket('wss://stream.aisstream.io/v0/stream');
    vesselWS.onopen=function(){
      vesselWS.send(JSON.stringify({
        APIKey:API_KEY,
        BoundingBoxes:[[[-90,-180],[90,180]]],
        FilterMessageTypes:['PositionReport'],
        FiltersShipMMSI:[MMSI]
      }));
      setState({vesselData:{status:'연결중... 선박 신호 대기'}});
    };
    vesselWS.onmessage=function(e){
      try{
        var msg=JSON.parse(e.data);
        var pos=msg.Message&&msg.Message.PositionReport;
        if(!pos)return;
        var lat=pos.Latitude,lon=pos.Longitude;
        var sog=pos.Sog||0,cog=pos.Cog||0;
        var dest=(msg.MetaData&&msg.MetaData.Destination)||'-';
        var data={
          lat:lat,lon:lon,
          speed:sog.toFixed(1),
          course:Math.round(cog),
          destination:dest.trim()||'-',
          status:'실시간',
          updated:new Date().toLocaleTimeString('ko-KR')
        };
        setState({vesselData:data});
        updateVesselMap(lat,lon);
      }catch(err){console.log('msg err',err);}
    };
    vesselWS.onerror=function(e){
      console.log('ws error',e);
      setState({vesselData:{status:'연결 오류 - 재시도중'}});
      vesselWS=null;
      setTimeout(startVesselTracking,3000);
    };
    vesselWS.onclose=function(){
      if(state.vesselPopup)setState({vesselData:Object.assign({},state.vesselData||{},{status:'연결 끊김'})});
      vesselWS=null;
    };
  }catch(e){
    console.log('ws init error',e);
    setState({vesselData:{status:'WebSocket 오류: '+e.message}});
  }
}

function updateVesselMap(lat,lon){
  if(!vesselMap){
    loadLeaflet(function(){
    setTimeout(function(){
      var mapEl=document.getElementById('vessel-map');
      if(!mapEl)return;
      vesselMap=L.map('vessel-map').setView([lat,lon],10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© OSM',maxZoom:18
      }).addTo(vesselMap);
      var icon=L.divIcon({
        html:'<div style="font-size:24px">🚢</div>',
        iconSize:[30,30],iconAnchor:[15,15],className:''
      });
      vesselMarker=L.marker([lat,lon],{icon:icon}).addTo(vesselMap);
      vesselMarker.bindPopup('SUNGWOO JEJU').openPopup();
    },100);
    });
  } else {
    vesselMarker.setLatLng([lat,lon]);
    vesselMap.setView([lat,lon],vesselMap.getZoom());
  }
}

function renderVesselPopup(){
  var bg=document.createElement('div');
  bg.className='vessel-popup-bg';
  var inner=document.createElement('div');
  inner.className='vessel-popup';
  inner.onclick=function(e){e.stopPropagation();};

  var head=document.createElement('div');
  head.className='vessel-head';
  var title=document.createElement('div');
  title.className='vessel-title';
  title.textContent='🚢 SUNGWOO JEJU 실시간 추적';
  var cls=document.createElement('div');
  cls.className='vessel-close';
  cls.textContent='✕';
  cls.onclick=closeVesselPopup;
  head.appendChild(title);head.appendChild(cls);
  inner.appendChild(head);

  var vd=state.vesselData;
  if(vd&&vd.lat){
    var info=document.createElement('div');
    info.className='vessel-info';
    [{l:'위도',v:vd.lat.toFixed(4)+'°'},{l:'경도',v:vd.lon.toFixed(4)+'°'},
     {l:'속도',v:vd.speed+' kts'},{l:'방향',v:vd.course+'°'},
     {l:'목적지',v:vd.destination},{l:'갱신',v:vd.updated}
    ].forEach(function(item){
      var d=document.createElement('div');d.className='vessel-info-item';
      d.innerHTML='<div>'+item.l+'</div><div class="vessel-info-val">'+item.v+'</div>';
      info.appendChild(d);
    });
    inner.appendChild(info);
  }

  var status=document.createElement('div');
  status.className='vessel-status';
  status.textContent=vd?(vd.status||'대기중'):'연결 준비중...';
  inner.appendChild(status);

  var mapDiv=document.createElement('div');
  mapDiv.id='vessel-map';
  inner.appendChild(mapDiv);

  bg.appendChild(inner);

  // 팝업 열리면 추적 시작
  setTimeout(startVesselTracking,200);
  return bg;
}

function toggleCar(idx,val){
  if(state.weekDays[idx]==="일")return;
  var k=dateKey(state.weekDateObjs[idx]);
  var cur=state.carDays[k];
  var map=Object.assign({},state.carDays);
  map[k]=(cur===val)?null:val;
  localStorage.setItem('carPlan',JSON.stringify(map));
  if(isAdmin())saveCarDays(map);
  setState({carDays:map});
}
function toggleExcl(idx,name){
  var k=dateKey(state.weekDateObjs[idx]);
  var map=Object.assign({},state.dayExcludes);
  var dayMap=Object.assign({},map[k]||{});
  var cur=dayMap[name];
  if(!cur)dayMap[name]="결근";
  else if(cur==="결근")dayMap[name]="씨월드";
  else if(cur==="씨월드")dayMap[name]="자동차";
  else delete dayMap[name];
  map[k]=dayMap;
  localStorage.setItem('dayExcludes',JSON.stringify(map));
  saveDayExcludes(map);
  setState({dayExcludes:map});
}
